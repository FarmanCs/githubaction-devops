name: hello github actions

on:
  workflow_dispatch:

jobs:
  say-hello-inline-bash:
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Hello from an inline bash script in a GitHub Action Workflow!"
  say-hello-from-nodejs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: const message = 'Hello from node.js in a github action workflow!'; console.log(message);
        shell: node
